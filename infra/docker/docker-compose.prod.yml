name: pssms-prod

# HIGHLINK PSSMS — Production (lean) stack for a small VPS.
# Public entrypoints (via Caddy, automatic HTTPS):
#   https://web.hisgc.co.tz  -> admin-web  (Next.js)
#   https://api.hisgc.co.tz  -> core-api   (NestJS)
#
# Bring up:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# NOTE: This intentionally omits Keycloak, RabbitMQ, MQTT, MinIO, the extra
# portals and the Python AI services so the whole thing fits a 2 GB box.
# core-api runs in AUTH_MODE=local (break-glass POST /auth/login) and only
# needs Postgres + Redis. Scale up on a larger host with the full compose.

x-backend-env: &backend-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
  REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
  AUTH_MODE: ${AUTH_MODE:-local}
  INTEGRATION_SERVICE_TOKEN: ${INTEGRATION_SERVICE_TOKEN}
  CORE_API_INTERNAL_URL: http://core-api:4001
  SMS_PROVIDER: console
  PAYMENT_PROVIDER: console
  WEBHOOK_VERIFY: "false"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pssms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pssms-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-migrate:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: build
    image: pssms-backend-build:prod
    container_name: pssms-db-migrate
    restart: "no"
    environment:
      <<: *backend-env
    # Fresh-DB safe order: schemas -> tables (db push) -> RLS files -> seed -> grants.
    command: >
      sh -c "
        npx prisma db execute --file prisma/migrations/0000_schemas/migration.sql --schema prisma/schema.prisma &&
        npx prisma db push --schema prisma/schema.prisma &&
        npx prisma db execute --file prisma/migrations/0001_reporting_rls/migration.sql --schema prisma/schema.prisma &&
        npm run prisma:seed &&
        npx prisma db execute --file prisma/migrations/0003_rls_core/migration.sql --schema prisma/schema.prisma &&
        npx prisma db execute --file prisma/migrations/0004_devices/migration.sql --schema prisma/schema.prisma
      "
    depends_on:
      postgres:
        condition: service_healthy

  core-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: pssms-core-api:prod
    container_name: pssms-core-api
    restart: unless-stopped
    environment:
      <<: *backend-env
      CORE_API_PORT: "4001"
      # Runs as the NON-OWNER app role so PostgreSQL RLS policies apply to every query.
      DATABASE_URL: postgresql://pssms_app:${PSSMS_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["node", "dist/apps/core-api/main.js"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: admin-web
        APP_PORT: "3000"
        NEXT_PUBLIC_CORE_API_URL: https://api.hisgc.co.tz
        NEXT_PUBLIC_REPORTING_API_URL: https://api.hisgc.co.tz
        NEXT_PUBLIC_OIDC_REDIRECT_URI: https://web.hisgc.co.tz/auth/callback
    image: pssms-admin-web:prod
    container_name: pssms-admin-web
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      core-api:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    container_name: pssms-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - core-api
      - admin-web

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
